name: test

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        luaVersion: ["5.1.5", "5.2.4", "5.3.6", "5.4.4", "luajit", "luajit-2.0", "luajit-2.1", "luajit-2.0.5", "luajit-2.1.0-beta3", "luajit-openresty", "5.1", "5.4", "5.5"]
        machineTag: ["ubuntu-latest", "macos-latest", "windows-latest"]
        exclude:
          - luaVersion: "luajit-2.0"
            machineTag: "macos-latest"
          - luaVersion: "luajit-2.0.5"
            machineTag: "macos-latest"
          - luaVersion: "luajit-2.0.5"
            machineTag: "windows-latest"
          - luaVersion: "luajit-2.1.0-beta3"
            machineTag: "windows-latest"

    runs-on: ${{ matrix.machineTag }}

    steps:
    - uses: actions/checkout@main

    - uses: ilammy/msvc-dev-cmd@v1

    - name: Build Lua
      uses: './'
      with:
        luaVersion: ${{ matrix.luaVersion }}
        buildCache: false

    - name: Test Lua
      run: lua -e "print('hi from lua')"

  test-cache:
    needs: test

    strategy:
      fail-fast: false
      matrix:
        luaVersion: ["5.1.5", "5.2.4", "5.3.6", "5.4.4", "luajit", "luajit-2.0", "luajit-2.1", "luajit-2.0.5", "luajit-2.1.0-beta3", "luajit-openresty", "5.1", "5.4"]
        machineTag: ["ubuntu-latest", "macos-latest", "windows-latest"]
        exclude:
          - luaVersion: "luajit-2.0"
            machineTag: "macos-latest"
          - luaVersion: "luajit-2.0.5"
            machineTag: "macos-latest"
          - luaVersion: "luajit-2.0.5"
            machineTag: "windows-latest"
          - luaVersion: "luajit-2.1.0-beta3"
            machineTag: "windows-latest"

    runs-on: ${{ matrix.machineTag }}

    steps:
    - uses: actions/checkout@main

    - name: Get Lua from cache
      uses: './'
      with:
        luaVersion: ${{ matrix.luaVersion }}

    - name: Test Lua
      run: lua -e "print('hi from lua')"

  pr-required-check:
    if: ${{ github.event_name == 'pull_request' }}
    needs: [test, test-cache]
    runs-on: ubuntu-latest
    steps:
    - name: PR check
      run: echo "This check is required for PRs to be merged, but it doesn't do anything. If the tests above fail, this won't run and the PR can't be merged."
