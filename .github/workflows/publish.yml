name: publish

on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        luaVersion:
          [
            5.1.5,
            5.2.4,
            5.3.5,
            5.4.1,
            luajit-2.0.5,
            luajit-2.1.0-beta3,
            luajit-openresty,
            5.1,
          ]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: bundle binaries
        run: tar czf '${{matrix.luaVersion}}.tar.gz' .lua

      - name: upload to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.luaVersion }}.tar.gz
          asset_name: ${{ matrix.luaVersion }}.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
